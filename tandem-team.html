<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Tandem Team — How It Works</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
  #back-nav {
    position: fixed; top: 16px; left: 20px; z-index: 200;
  }
  #back-nav a {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 8px; border: 1px solid #334155;
    background: #1e293bcc; color: #94a3b8; text-decoration: none;
    font-size: 13px; font-weight: 500; backdrop-filter: blur(8px);
    transition: border-color 0.2s, color 0.2s;
  }
  #back-nav a:hover { border-color: #60a5fa; color: #e2e8f0; }
  canvas { display: block; }

  #controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 100; align-items: center;
  }
  #controls button {
    padding: 8px 18px; border-radius: 8px; border: 1px solid #334155;
    background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 13px;
    font-weight: 600; transition: all 0.2s;
  }
  #controls button:hover { border-color: #6366f1; color: #a5b4fc; }
  #controls button.active { background: #6366f130; border-color: #6366f1; color: #a5b4fc; }

  #progress-bar {
    position: fixed; bottom: 0; left: 0; height: 4px; background: #6366f1;
    transition: width 0.3s; z-index: 100; border-radius: 0 2px 0 0;
  }

  #scene-label {
    position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
    color: #475569; font-size: 11px; z-index: 100; letter-spacing: 2px;
    text-transform: uppercase; white-space: nowrap;
  }
</style>
</head>
<body>
<div id="back-nav"><a href="index.html">&larr; Amerix Home</a></div>

<canvas id="c"></canvas>

<div id="progress-bar" style="width:0%"></div>
<div id="scene-label"></div>
<div id="controls">
  <button onclick="skipScene(-1)">&#9664; Prev</button>
  <button onclick="restart()">&#10226; Restart</button>
  <button id="playBtn" class="active" onclick="togglePlay()">&#9208; Pause</button>
  <button onclick="skipScene(1)">Next &#9654;</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, layoutR;
let time = 0;
let playing = true;
let sceneIndex = 0;
let sceneTime = 0;

// ─── COLOR PALETTE ───
const C = {
  silas:    '#f97316',
  council:  '#10b981',
  proctor:  '#6366f1',
  brother:  '#f59e0b',
  sister:   '#ec4899',
  text:     '#e2e8f0',
  dim:      '#475569',
  bg:       '#0a0e1a',
  panel:    '#1e293b',
  accent:   '#a5b4fc',
  archive:  '#34d399',
  discord:  '#5865F2',
  file:     '#94a3b8',
  // Agent swarm colors
  ag1: '#38bdf8', ag2: '#a78bfa', ag3: '#fb923c', ag4: '#4ade80', ag5: '#f472b6',
};

// ─── TEAM MEMBERS ───
const teammates = {
  silas:   { label: 'SILAS',      sub: 'CEO',                    color: C.silas,   x:0, y:0, icon: '\u{1F464}',    sz: 36 },
  proctor: { label: 'PROCTOR',    sub: 'Strategic Coordinator',   color: C.proctor, x:0, y:0, icon: '\u{1F3AF}',   sz: 34 },
  brother: { label: 'BROTHER',    sub: 'Chief Engineer',          color: C.brother, x:0, y:0, icon: '\u{26A1}',    sz: 34 },
  sister:  { label: 'SISTER 2.0', sub: 'RC Window',               color: C.sister,  x:0, y:0, icon: '\u{1F517}',   sz: 28 },
  council: { label: 'COUNCIL',    sub: 'n8n Engine \u2022 24/7',  color: C.council, x:0, y:0, icon: '\u{2699}\u{FE0F}', sz: 30 },
};

// ─── PACKETS ───
let packets = [];
function sendPacket(fromId, toId, label, color, speed) {
  const f = teammates[fromId], t = teammates[toId];
  packets.push({ sx:f.x, sy:f.y, tx:t.x, ty:t.y, x:f.x, y:f.y,
    progress:0, speed: speed||0.012, color: color||f.color, label: label||'',
    size:5, trail:[], alive:true });
}
function sendPacketXY(fx,fy,tx,ty, label, color, speed) {
  packets.push({ sx:fx, sy:fy, tx, ty, x:fx, y:fy,
    progress:0, speed: speed||0.015, color: color||C.accent, label: label||'',
    size:4, trail:[], alive:true });
}

// ─── HIGHLIGHTS & PULSES ───
let highlights = {};
function highlight(id) { highlights[id] = 1; }
function unhighlightAll() { highlights = {}; }

let pulseRings = [];
function addPulse(id, color) {
  const t = teammates[id];
  pulseRings.push({ x:t.x, y:t.y, r:30, maxR:90, color: color||t.color, alpha:0.6 });
}
function addPulseXY(x,y,color) {
  pulseRings.push({ x, y, r:8, maxR:50, color: color||C.accent, alpha:0.5 });
}

// ─── EASING ───
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
function easeIn(t)  { return t * t * t; }
function easeInOut(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }

// ─── STAR FIELD ───
let stars = [];
function initStars() {
  stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({ x: Math.random()*4000, y: Math.random()*3000, s: Math.random()*1.5+0.3, b: Math.random() });
  }
}
function drawStars() {
  stars.forEach(s => {
    const flicker = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(time * 0.02 + s.b * 10));
    ctx.beginPath(); ctx.arc(s.x % W, s.y % H, s.s, 0, Math.PI*2);
    ctx.fillStyle = '#334155' + Math.round(flicker * 80).toString(16).padStart(2,'0');
    ctx.fill();
  });
}

// ─── MINI AGENT (for swarms) ───
function drawMiniAgent(x, y, label, color, alpha, workingT) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
  const grad = ctx.createRadialGradient(x,y,0, x,y,24);
  grad.addColorStop(0, color + '30'); grad.addColorStop(1, color + '00');
  ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x,y,24,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x,y,14,0,Math.PI*2);
  ctx.fillStyle = C.bg; ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,11,0,Math.PI*2);
  ctx.fillStyle = color + '15'; ctx.fill();
  ctx.font = '12px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", system-ui';
  ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('\u{1F916}', x, y);
  if (label) {
    ctx.font = 'bold 8px system-ui'; ctx.fillStyle = color; ctx.textBaseline = 'top';
    ctx.fillText(label, x, y + 17);
  }
  if (workingT > 0) {
    const n = 3;
    for (let i = 0; i < n; i++) {
      const a = (workingT * 0.08) + (i * Math.PI * 2 / n);
      const dx = Math.cos(a) * 20, dy = Math.sin(a) * 20;
      ctx.beginPath(); ctx.arc(x+dx, y+dy, 2, 0, Math.PI*2);
      ctx.fillStyle = color + '90'; ctx.fill();
    }
  }
  ctx.restore();
}

// ─── AGENT SPAWN SYSTEM ───
function spawnAgentsFrom(parentId, agentDefs, spawnStart, t) {
  const parent = teammates[parentId];
  agentDefs.forEach((def, i) => {
    const elapsed = t - spawnStart - i * 18;
    if (elapsed < 0) return;
    const angle = def.angle;
    const dist = def.dist || 120;
    const targetX = parent.x + Math.cos(angle) * dist;
    const targetY = parent.y + Math.sin(angle) * dist;
    const flyDur = 30;
    const progress = Math.min(elapsed / flyDur, 1);
    const ax = parent.x + (targetX - parent.x) * easeOut(progress);
    const ay = parent.y + (targetY - parent.y) * easeOut(progress);
    const alpha = Math.min(elapsed / 12, 1);
    // Tether
    ctx.beginPath(); ctx.moveTo(parent.x, parent.y); ctx.lineTo(ax, ay);
    ctx.strokeStyle = def.color + '25'; ctx.lineWidth = 1; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
    const isWorking = def.working && progress >= 1;
    drawMiniAgent(ax, ay, def.label, def.color, alpha, isWorking ? t : 0);
    if (elapsed >= 0 && elapsed <= 2) addPulseXY(parent.x, parent.y, def.color);
  });
}

function returnAgentsTo(parentId, agentDefs, returnStart, t, duration) {
  const parent = teammates[parentId];
  const dur = duration || 30;
  agentDefs.forEach((def, i) => {
    const elapsed = t - returnStart - i * 14;
    if (elapsed < 0) {
      const dist = def.dist || 120;
      const ax = parent.x + Math.cos(def.angle) * dist;
      const ay = parent.y + Math.sin(def.angle) * dist;
      ctx.beginPath(); ctx.moveTo(parent.x,parent.y); ctx.lineTo(ax,ay);
      ctx.strokeStyle = def.color + '25'; ctx.lineWidth = 1; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
      drawMiniAgent(ax, ay, def.label, def.color, 1, t);
      return;
    }
    const progress = Math.min(elapsed / dur, 1);
    if (progress >= 1) return;
    const dist = def.dist || 120;
    const fromX = parent.x + Math.cos(def.angle) * dist;
    const fromY = parent.y + Math.sin(def.angle) * dist;
    const ax = fromX + (parent.x - fromX) * easeIn(progress);
    const ay = fromY + (parent.y - fromY) * easeIn(progress);
    const alpha = 1 - progress;
    ctx.beginPath(); ctx.moveTo(parent.x,parent.y); ctx.lineTo(ax,ay);
    ctx.strokeStyle = def.color + Math.round(alpha*0.25*255).toString(16).padStart(2,'0');
    ctx.lineWidth = 1; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
    drawMiniAgent(ax, ay, def.result||def.label, def.color, alpha, 0);
    if (elapsed <= 1) {
      sendPacketXY(fromX, fromY, parent.x, parent.y, def.result||'', def.color, 0.03);
      addPulseXY(fromX, fromY, def.color);
    }
  });
}

// ─── AGENT DEFINITIONS ───
const brotherAgents = [
  { label: 'EXPLORER',  color: C.ag1, angle: -Math.PI*0.75, dist: 110, working: true, result: 'PATHS' },
  { label: 'TESTER',    color: C.ag4, angle: -Math.PI*0.45, dist: 125, working: true, result: 'PASS' },
  { label: 'BUILDER',   color: C.ag3, angle: -Math.PI*0.15, dist: 110, working: true, result: 'BUILD' },
  { label: 'REVIEWER',  color: C.ag2, angle: Math.PI*0.15,  dist: 120, working: true, result: 'CLEAN' },
  { label: 'DEPLOYER',  color: C.ag5, angle: Math.PI*0.40,  dist: 108, working: true, result: 'LIVE' },
];

// ─── DRAWING HELPERS ───
function drawTeammate(m) {
  const id = Object.keys(teammates).find(k => teammates[k] === m);
  const isHL = highlights[id] || 0;
  const glowStrength = isHL ? 0.15 : 0.05;
  const grad = ctx.createRadialGradient(m.x,m.y,0, m.x,m.y, m.sz*2.2);
  grad.addColorStop(0, m.color + Math.round(glowStrength*255).toString(16).padStart(2,'0'));
  grad.addColorStop(1, m.color + '00');
  ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(m.x,m.y, m.sz*2.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(m.x,m.y, m.sz, 0, Math.PI*2);
  ctx.fillStyle = C.bg; ctx.fill();
  ctx.strokeStyle = m.color + (isHL ? 'dd' : '70');
  ctx.lineWidth = isHL ? 3 : 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(m.x,m.y, m.sz-3, 0, Math.PI*2);
  ctx.fillStyle = m.color + '10'; ctx.fill();
  if (isHL) {
    const pulse = 0.5 + 0.5 * Math.sin(time * 0.06);
    ctx.beginPath(); ctx.arc(m.x,m.y, m.sz+4, 0, Math.PI*2);
    ctx.strokeStyle = m.color + Math.round(pulse*60).toString(16).padStart(2,'0');
    ctx.lineWidth = 1.5; ctx.stroke();
  }
  ctx.font = `${m.sz * 0.7}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(m.icon, m.x, m.y - 1);
  ctx.font = `bold ${id==='council' ? 11 : 10}px system-ui`;
  ctx.fillStyle = m.color; ctx.textBaseline = 'top';
  ctx.fillText(m.label, m.x, m.y + m.sz + 6);
  ctx.font = '9px system-ui'; ctx.fillStyle = C.dim;
  ctx.fillText(m.sub, m.x, m.y + m.sz + 20);
}

function drawAllTeammates() {
  Object.values(teammates).forEach(m => drawTeammate(m));
}

function drawStructureLines(alpha) {
  // Silas to Proctor (primary input -- strong)
  drawDashedLine(teammates.silas, teammates.proctor, C.proctor, alpha * 0.7);
  // Silas to Brother (direct terminal access)
  drawDashedLine(teammates.silas, teammates.brother, C.brother, alpha * 0.45);
  // Silas to Sister (RC window access)
  drawDashedLine(teammates.silas, teammates.sister, C.sister, alpha * 0.35);
  // Proctor routes to Brother (Discord #handoffs -- the primary work channel)
  drawDashedLine(teammates.proctor, teammates.brother, C.discord, alpha * 0.6);
  // Sister IS Brother -- strong solid line
  drawSolidLine(teammates.brother, teammates.sister, C.sister, alpha * 0.8, 2.5);
  // Sister weak dashed to Proctor
  drawDashedLine(teammates.proctor, teammates.sister, C.sister, alpha * 0.2);
  // Council sends to both agents
  drawDashedLine(teammates.council, teammates.proctor, C.council, alpha * 0.25);
  drawDashedLine(teammates.council, teammates.brother, C.council, alpha * 0.25);
}

function drawDashedLine(from, to, color, alpha) {
  ctx.beginPath(); ctx.moveTo(from.x,from.y); ctx.lineTo(to.x,to.y);
  ctx.strokeStyle = color + Math.round(Math.min(alpha,1)*255).toString(16).padStart(2,'0');
  ctx.lineWidth = 1.5; ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);
}

function drawSolidLine(from, to, color, alpha, width) {
  ctx.beginPath(); ctx.moveTo(from.x,from.y); ctx.lineTo(to.x,to.y);
  ctx.strokeStyle = color + Math.round(Math.min(alpha,1)*255).toString(16).padStart(2,'0');
  ctx.lineWidth = width || 2; ctx.stroke();
}

function drawBridge(from, to, label, color, progress) {
  const mx = (from.x+to.x)/2, my = (from.y+to.y)/2;
  ctx.beginPath(); ctx.moveTo(from.x,from.y); ctx.lineTo(to.x,to.y);
  ctx.strokeStyle = color + Math.round(progress*0.6*255).toString(16).padStart(2,'0');
  ctx.lineWidth = 3; ctx.stroke();
  // Animated particle along bridge
  const pp = (time * 0.025) % 1;
  const px = from.x + (to.x - from.x) * pp;
  const py = from.y + (to.y - from.y) * pp;
  ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2);
  ctx.fillStyle = color; ctx.fill();
  // Return particle
  const pp2 = ((time * 0.025) + 0.5) % 1;
  const px2 = from.x + (to.x - from.x) * pp2;
  const py2 = from.y + (to.y - from.y) * pp2;
  ctx.beginPath(); ctx.arc(px2,py2,2.5,0,Math.PI*2);
  ctx.fillStyle = color + 'aa'; ctx.fill();
  if (label) {
    ctx.globalAlpha = progress;
    ctx.fillStyle = C.panel + 'ee';
    ctx.beginPath(); ctx.roundRect(mx-50, my-13, 100, 26, 6); ctx.fill();
    ctx.strokeStyle = color + '80'; ctx.lineWidth = 1; ctx.stroke();
    ctx.font = 'bold 10px system-ui'; ctx.fillStyle = color;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(label, mx, my);
    ctx.globalAlpha = 1;
  }
}

function drawCaption(text, x, y, color, size) {
  const sz = size || 15;
  ctx.font = `${sz}px system-ui`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const w = ctx.measureText(text).width + 40;
  ctx.fillStyle = C.bg + 'dd';
  ctx.fillRect(x - w/2, y - sz/2 - 8, w, sz + 16);
  ctx.fillStyle = color || C.text;
  ctx.fillText(text, x, y);
}

function drawCaptionFade(text, x, y, color, size, fadeT) {
  const alpha = Math.min(fadeT / 20, 1);
  ctx.save(); ctx.globalAlpha = alpha;
  drawCaption(text, x, y, color, size);
  ctx.restore();
}

function drawCallout(x, y, text, color) {
  ctx.font = '11px system-ui';
  const w = ctx.measureText(text).width + 20;
  ctx.fillStyle = C.panel + 'dd';
  ctx.beginPath(); ctx.roundRect(x - w/2, y - 11, w, 22, 6); ctx.fill();
  ctx.strokeStyle = color + '40'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

function drawThinkBubble(m, text, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha !== undefined ? alpha : 1;
  const bx = m.x, by = m.y - 60;
  ctx.font = '12px system-ui';
  const tw = ctx.measureText('\u{1F4AD} ' + text).width;
  const bw = Math.max(tw + 32, 200);
  ctx.fillStyle = C.panel + 'ee';
  ctx.beginPath(); ctx.roundRect(bx-bw/2, by-15, bw, 30, 8); ctx.fill();
  ctx.strokeStyle = m.color + '60'; ctx.lineWidth = 1; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx-6, by+15); ctx.lineTo(bx+6, by+15); ctx.lineTo(bx, by+24);
  ctx.fillStyle = C.panel + 'ee'; ctx.fill();
  ctx.fillStyle = C.accent;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('\u{1F4AD} ' + text, bx, by);
  ctx.restore();
}

function drawSpeechBubble(x, y, text, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.font = '12px system-ui';
  const tw = ctx.measureText(text).width;
  ctx.fillStyle = color + '18';
  ctx.beginPath(); ctx.roundRect(x-8, y-15, tw+24, 30, 8); ctx.fill();
  ctx.strokeStyle = color + '50'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = color; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(text, x + 4, y);
  ctx.restore();
}

function drawWorkingIndicator(m, t) {
  const n = 4;
  for (let i = 0; i < n; i++) {
    const a = (t * 0.07) + (i * Math.PI * 2 / n);
    const dx = Math.cos(a) * (m.sz + 12);
    const dy = Math.sin(a) * (m.sz + 12);
    ctx.beginPath(); ctx.arc(m.x+dx, m.y+dy, 2.5, 0, Math.PI*2);
    ctx.fillStyle = m.color + '80'; ctx.fill();
  }
}

function drawCodeLines(x, y, t, lines) {
  const code = lines || [
    'const result = await engine.run()',
    'if (result.status === "ok") {',
    '  await deploy(result.data)',
    '  notify("DEPLOYED")',
    '}'
  ];
  const alpha = Math.min(t / 20, 0.75);
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle = C.panel + 'cc';
  ctx.beginPath(); ctx.roundRect(x-5, y-5, 185, code.length*14+12, 4); ctx.fill();
  ctx.strokeStyle = C.brother + '30'; ctx.lineWidth = 1; ctx.stroke();
  code.forEach((line, i) => {
    const charCount = Math.min(Math.floor((t - i*10) / 1.5), line.length);
    if (charCount > 0) {
      ctx.font = '9px Consolas, monospace'; ctx.fillStyle = C.brother + 'bb'; ctx.textAlign = 'left';
      ctx.fillText(line.substring(0, charCount), x+4, y+10+i*14);
      if (charCount < line.length && Math.floor(t/8)%2 === 0) {
        const cursorX = x + 4 + ctx.measureText(line.substring(0,charCount)).width;
        ctx.fillStyle = C.brother;
        ctx.fillRect(cursorX, y+2+i*14, 6, 12);
      }
    }
  });
  ctx.restore();
}

function drawDiscordChannel(x, y, name, messages, t) {
  const w = 230, h = 30 + messages.length * 22;
  ctx.save();
  const alpha = Math.min(t / 20, 0.9);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#36393f';
  ctx.beginPath(); ctx.roundRect(x, y, w, h, 8); ctx.fill();
  ctx.strokeStyle = C.discord + '50'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#2f3136';
  ctx.beginPath(); ctx.roundRect(x, y, w, 26, [8,8,0,0]); ctx.fill();
  ctx.font = 'bold 11px system-ui'; ctx.fillStyle = C.discord;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('# ' + name, x + 10, y + 13);
  messages.forEach((msg, i) => {
    const msgT = t - 20 - i * 15;
    if (msgT < 0) return;
    const msgAlpha = Math.min(msgT / 10, 1);
    ctx.globalAlpha = alpha * msgAlpha;
    ctx.font = 'bold 9px system-ui'; ctx.fillStyle = msg.color || C.dim;
    ctx.fillText(msg.author || '', x + 10, y + 38 + i * 22);
    ctx.font = '9px system-ui'; ctx.fillStyle = '#dcddde';
    ctx.fillText(msg.text || '', x + 10 + (msg.author ? ctx.measureText(msg.author).width + 8 : 0), y + 38 + i * 22);
  });
  ctx.restore();
}

function drawFileIcon(x, y, name, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle = C.panel;
  ctx.beginPath(); ctx.roundRect(x-40, y-14, 80, 28, 4); ctx.fill();
  ctx.strokeStyle = color + '60'; ctx.lineWidth = 1; ctx.stroke();
  ctx.font = '10px Consolas, monospace'; ctx.fillStyle = color;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(name, x, y);
  ctx.restore();
}

function drawChecklist(x, y, items, t, color) {
  items.forEach((item, i) => {
    const itemT = t - i * 25;
    if (itemT < 0) return;
    const alpha = Math.min(itemT / 15, 1);
    const checked = itemT > 40;
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.strokeStyle = (checked ? C.archive : color) + 'cc'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(x - 8, y + i * 24 - 8, 16, 16, 3); ctx.stroke();
    if (checked) {
      ctx.strokeStyle = C.archive; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x-4, y+i*24); ctx.lineTo(x, y+i*24+5); ctx.lineTo(x+6, y+i*24-4); ctx.stroke();
    }
    ctx.font = '11px system-ui'; ctx.fillStyle = checked ? C.archive : color;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(item, x + 16, y + i * 24);
    ctx.restore();
  });
}

// ─── DUAL-WRITE VISUAL ───
function drawDualWrite(fromId, toId, t, startT) {
  const elapsed = t - startT;
  if (elapsed < 0) return;
  const from = teammates[fromId], to = teammates[toId];
  const midX = (from.x + to.x) / 2;
  const midY = (from.y + to.y) / 2;

  // Discord path (above)
  const discY = midY - 30;
  // File path (below)
  const fileY = midY + 30;

  const progress = Math.min(elapsed / 40, 1);
  ctx.save(); ctx.globalAlpha = progress * 0.85;

  // Fork from sender
  ctx.beginPath(); ctx.moveTo(from.x, from.y);
  ctx.quadraticCurveTo(midX, discY - 20, to.x, to.y);
  ctx.strokeStyle = C.discord + '50'; ctx.lineWidth = 1.5; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);

  ctx.beginPath(); ctx.moveTo(from.x, from.y);
  ctx.quadraticCurveTo(midX, fileY + 20, to.x, to.y);
  ctx.strokeStyle = C.file + '40'; ctx.lineWidth = 1.5; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);

  // Labels on paths
  if (elapsed > 10) {
    ctx.font = 'bold 9px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = C.discord;
    ctx.fillText('\u{1F4AC} Discord #handoffs', midX, discY - 8);
    ctx.fillStyle = C.file;
    ctx.fillText('\u{1F4C4} inbox-' + toId + '.md', midX, fileY + 12);
  }
  ctx.restore();
}

// ─── INTERFACE LABEL ───
function drawInterfaceLabel(m, label, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.font = '10px system-ui'; ctx.fillStyle = color;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const w = ctx.measureText(label).width + 16;
  ctx.fillStyle = C.panel + 'cc';
  ctx.beginPath(); ctx.roundRect(m.x - w/2, m.y - m.sz - 22, w, 18, 4); ctx.fill();
  ctx.strokeStyle = color + '50'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = color; ctx.textAlign = 'center';
  ctx.fillText(label, m.x, m.y - m.sz - 13);
  ctx.restore();
}

// ════════════════════════════════════════════════════
// ═══                   ENGINE                    ═══
// ════════════════════════════════════════════════════

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  layoutR = Math.min(W, H) * 0.32;

  // Layout per requirements:
  // SILAS: top, slightly left of center
  teammates.silas.x    = cx - layoutR * 0.15;   teammates.silas.y    = cy - layoutR * 0.95;
  // PROCTOR: left side, mid-height
  teammates.proctor.x  = cx - layoutR * 0.95;   teammates.proctor.y  = cy + layoutR * 0.15;
  // BROTHER: right side, mid-height (peer with Proctor)
  teammates.brother.x  = cx + layoutR * 0.55;   teammates.brother.y  = cy + layoutR * 0.15;
  // SISTER 2.0: between Proctor and Brother, slightly above their line, kicked toward Brother
  teammates.sister.x   = cx + layoutR * 0.10;   teammates.sister.y   = cy - layoutR * 0.15;
  // COUNCIL: far right, upper area (satellite)
  teammates.council.x  = cx + layoutR * 1.30;   teammates.council.y  = cy - layoutR * 0.35;
}

function loop() {
  if (!playing) { requestAnimationFrame(loop); return; }
  time++; sceneTime++;
  ctx.clearRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = '#1a1f3010'; ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  drawStars();

  // Run current scene
  const scene = SCENES[sceneIndex];
  if (scene) {
    scene.run(sceneTime);
    if (sceneTime >= scene.duration) skipScene(1);
  }

  // Render packets
  packets.forEach(p => {
    p.trail.push({x:p.x, y:p.y});
    if (p.trail.length > 18) p.trail.shift();
    p.progress += p.speed;
    const t = easeInOut(Math.min(p.progress, 1));
    p.x = p.sx + (p.tx - p.sx) * t;
    p.y = p.sy + (p.ty - p.sy) * t;
    if (p.progress >= 1) { p.alive = false; addPulseXY(p.tx, p.ty, p.color); return; }
    // Trail
    p.trail.forEach((pt, i) => {
      const a = (i / p.trail.length) * 0.3;
      ctx.beginPath(); ctx.arc(pt.x, pt.y, p.size * (i/p.trail.length), 0, Math.PI*2);
      ctx.fillStyle = p.color + Math.round(a*255).toString(16).padStart(2,'0'); ctx.fill();
    });
    // Glow
    const grd = ctx.createRadialGradient(p.x,p.y,0, p.x,p.y, p.size*4);
    grd.addColorStop(0, p.color + '40'); grd.addColorStop(1, p.color + '00');
    ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(p.x,p.y, p.size*4, 0, Math.PI*2); ctx.fill();
    // Core
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fillStyle = p.color; ctx.fill();
    // Label
    if (p.label) {
      ctx.font = '9px system-ui'; ctx.fillStyle = p.color + 'cc';
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText(p.label, p.x, p.y - p.size - 4);
    }
  });
  packets = packets.filter(p => p.alive);

  // Render pulse rings
  pulseRings.forEach(r => {
    r.r += 1.0; r.alpha *= 0.965;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
    ctx.strokeStyle = r.color + Math.round(Math.min(r.alpha, 1)*255).toString(16).padStart(2,'0');
    ctx.lineWidth = 2; ctx.stroke();
  });
  pulseRings = pulseRings.filter(r => r.alpha > 0.01);

  // Progress bar
  const totalDuration = SCENES.reduce((s, sc) => s + sc.duration, 0);
  const elapsed = SCENES.slice(0, sceneIndex).reduce((s, sc) => s + sc.duration, 0) + sceneTime;
  document.getElementById('progress-bar').style.width = (elapsed / totalDuration * 100) + '%';
  document.getElementById('scene-label').textContent = scene
    ? `SCENE ${sceneIndex+1} / ${SCENES.length} \u2014 ${scene.name}`
    : '';

  requestAnimationFrame(loop);
}

function skipScene(dir) {
  const newIndex = sceneIndex + dir;
  if (newIndex < 0 || newIndex >= SCENES.length) return;
  sceneIndex = newIndex;
  sceneTime = 0;
  packets = []; pulseRings = []; unhighlightAll();
  if (SCENES[sceneIndex].setup) SCENES[sceneIndex].setup();
}

function restart() {
  sceneIndex = 0; sceneTime = 0;
  packets = []; pulseRings = []; unhighlightAll();
  if (SCENES[0].setup) SCENES[0].setup();
  playing = true;
  document.getElementById('playBtn').textContent = '\u23F8 Pause';
  document.getElementById('playBtn').classList.add('active');
}

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('playBtn');
  btn.textContent = playing ? '\u23F8 Pause' : '\u25B6 Play';
  btn.classList.toggle('active', playing);
}

// ─── INIT ───
initStars();
window.addEventListener('resize', () => { resize(); initStars(); });
resize();
if (SCENES[0].setup) SCENES[0].setup();
loop();
</script>
